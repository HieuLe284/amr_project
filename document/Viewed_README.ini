Đã hoàn tất kết nối theo đúng logic pipeline của bạn!

**Pipeline hiện tại:** `Graph SLAM => Frontier => A* => DWA`

Chi tiết luồng hoạt động:
1. `graph_slam` tính toán bản đồ (map) và vị trí robot (`cur.x, cur.y`).
2. `frontier_explorer_.compute()` quét map tìm vùng chưa biết và trả về điểm trọng tâm `(fx, fy)` của frontier tốt nhất.
3. Trong `slam_exploration()`, tôi đã thêm code bắt lấy `(fx, fy)` này và **tự động bơm thẳng vào** cho A* Global Planner qua hàm `global_planner_.setGoal(fx, fy)`. Ngay lập tức biến `global_planner_mode_` được bật lên `true`.
4. Sau đó `slam_global_planner()` chạy thuật toán A* để tính ra đường đi tối ưu (có thể tránh vật cản theo 8 hướng trên bản đồ) từ vị trí robot đến điểm frontier kia, rồi tính ra `goal_angle` nhắm đến điểm waypoint đầu tiên.
5. Cuối cùng, hàm `scanCallback()` sẽ ưu tiên lấy `goal_angle` của A* truyền vào cho DWA để DWA tính vận tốc `(v, w)` sao cho không bị đâm vào tường.

*(Lưu ý: Nếu không muốn tự động khám phá nữa, bạn chỉ cần tắt cờ `exploration_mode_` đi là xong, khi đó bạn có thể manual đặt Goal cho A* thông qua ROS Topic như bình thường)*. Bạn có thể gõ `colcon build` để test ngay bây giờ!