# Graph SLAM Framework

Đây là hệ thống Graph SLAM viết bằng C++, thiết kế theo dạng module hóa gồm: frontend, backend, tối ưu hóa, loop closure và mapping.

---

# 1. types/
Chứa các kiểu dữ liệu cơ bản dùng trong toàn bộ hệ thống.

- `pose2d.hpp`: trạng thái robot 2D (x, y, θ), các phép biến đổi SE(2) 
- `edge.hpp`: ràng buộc giữa hai node trong pose graph
- `measurement.hpp`: dữ liệu đo từ cảm biến
- `control.hpp`: tín hiệu điều khiển robot (v, ω, dt)
- `laser_scan.hpp`: dữ liệu quét LiDAR

---

# 2. math/
Các công cụ toán học phục vụ SLAM.

- `matrix.hpp`: ma trận nhỏ (dense matrix)
- `sparse_matrix.hpp`: ma trận thưa cho graph lớn
- `jacobian.hpp`: tính đạo hàm cho bài toán tối ưu
- `transforms.hpp`: biến đổi tọa độ SE(2), compose và inverse

---

# 3. graph/
Quản lý cấu trúc đồ thị SLAM (pose graph).

- `pose_graph.hpp`: lưu node (pose) và edge (constraint)
- `graph_builder.hpp`: xây dựng graph từ dữ liệu cảm biến
- `graph_slam.hpp`: điều phối toàn bộ pipeline SLAM
- `graph_types.hpp`: định nghĩa các kiểu dữ liệu trong graph

---

# 4. optimizer/
Bộ giải tối ưu phi tuyến cho SLAM.

- `graph_optimizer.hpp`: interface tổng cho optimizer
- `gauss_newton.hpp`: thuật toán Gauss-Newton
- `levenberg_marquardt.hpp`: LM (ổn định hơn GN)
- `sparse_optimizer.hpp`: xử lý hệ lớn dạng thưa
- `conjugate_gradient.hpp`: giải hệ tuyến tính lặp
- `robust_kernel.hpp`: xử lý outlier (Huber, Cauchy)

---

# 5. loop_closure/
Phát hiện robot quay lại vị trí cũ.

- `loop_closure_detector.hpp`: phát hiện loop closure
- `scan_descriptor.hpp`: trích đặc trưng từ LiDAR
- `scan_matcher.hpp`: so khớp hai lần quét
- `icp.hpp`: tinh chỉnh bằng ICP

---

# 6. mapping/
Xây dựng bản đồ môi trường.

- `occupancy_grid.hpp`: bản đồ dạng lưới xác suất
- `landmark_map.hpp`: bản đồ theo landmark
- `dynamic_slam.hpp`: loại bỏ vật thể di động
- `map_builder.hpp`: xây dựng bản đồ cuối cùng từ graph

---

# 7. frontend/
Xử lý dữ liệu cảm biến đầu vào.

- `odometry_frontend.hpp`: xử lý odometry bánh xe
- `lidar_frontend.hpp`: xử lý dữ liệu LiDAR
- `imu_frontend.hpp`: xử lý IMU
- `sensor_fusion.hpp`: hợp nhất nhiều cảm biến

---

# 8. backend/
Xử lý tối ưu và quản lý trạng thái hệ thống.

- `backend_optimizer.hpp`: điều phối tối ưu hóa
- `pose_graph_backend.hpp`: quản lý pose graph
- `covariance_estimator.hpp`: ước lượng sai số / nhiễu

---

# 9. visualization/
Công cụ hiển thị và debug hệ thống SLAM.

- `slam_visualizer.hpp`: hiển thị toàn bộ hệ thống
- `graph_plotter.hpp`: vẽ pose graph
- `trajectory_plotter.hpp`: vẽ quỹ đạo robot

---

# 10. utils/
Các tiện ích hỗ trợ hệ thống.

- `logger.hpp`: ghi log hệ thống
- `timer.hpp`: đo hiệu năng
- `config.hpp`: đọc file cấu hình YAML
- `file_io.hpp`: đọc/ghi dữ liệu

---

# Luồng hoạt động hệ thống

Sensor (LiDAR / IMU / Odometry)  
→ Frontend (xử lý dữ liệu)  
→ Graph Builder (tạo node + edge)  
→ Loop Closure (phát hiện quay lại)  
→ Optimizer (tối ưu pose graph)  
→ Backend (cập nhật trạng thái)  
→ Mapping (tạo bản đồ)  
→ Visualization (hiển thị kết quả)